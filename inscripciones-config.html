<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/jpeg" href="logo.jpeg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAC - Inscripciones</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rojo: #CC0000; --rojo-oscuro: #990000;
      --gris: #1a1a1a; --gris-medio: #2d2d2d; --gris-campo: #222;
      --blanco: #ffffff; --texto-muted: #888; --borde: #3a3a3a;
      --verde: #16a34a;
    }
    body { font-family: 'Barlow', sans-serif; background: var(--gris); color: var(--blanco); min-height: 100vh; }

    header { background: var(--gris); border-bottom: 3px solid var(--rojo); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 70px; position: sticky; top: 0; z-index: 100; }
    .header-logo { display: flex; align-items: center; gap: 1rem; }
    .logo-circle { width: 48px; height: 48px; border-radius: 50%; overflow: hidden; flex-shrink: 0; display: block; }
    .logo-circle img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .header-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; line-height: 1.2; }
    .header-title span { display: block; font-size: 0.7rem; font-weight: 400; letter-spacing: 3px; color: var(--texto-muted); }
    .header-right { display: flex; align-items: center; gap: 1rem; }
    .nav-link { display: flex; align-items: center; gap: 0.4rem; color: var(--texto-muted); text-decoration: none; font-size: 0.85rem; letter-spacing: 1px; transition: color 0.15s; }
    .nav-link:hover { color: var(--blanco); }
    .nav-link svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }
    #btnLogout { display: none; background: transparent; border: 1px solid #444; color: var(--texto-muted); padding: 0.4rem 1rem; border-radius: 3px; cursor: pointer; font-family: 'Barlow', sans-serif; font-size: 0.85rem; transition: border-color 0.15s, color 0.15s; }
    #btnLogout:hover { border-color: var(--rojo); color: var(--blanco); }

    /* LOGIN */
    #loginScreen { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 70px); padding: 2rem; }
    .login-box { background: var(--gris-medio); border: 1px solid var(--borde); border-top: 4px solid var(--rojo); border-radius: 2px; padding: 2.5rem 2rem; width: 100%; max-width: 380px; }
    .login-box h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 1.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 0.4rem; }
    .login-box p { color: var(--texto-muted); font-size: 0.85rem; margin-bottom: 1.75rem; }
    .login-box label { display: block; font-size: 0.75rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: #bbb; margin-bottom: 0.4rem; }
    .login-box input { width: 100%; background: var(--gris-campo); border: 1px solid var(--borde); border-radius: 3px; padding: 0.75rem 1rem; color: var(--blanco); font-family: 'Barlow', sans-serif; font-size: 1rem; outline: none; transition: border-color 0.15s; margin-bottom: 1rem; }
    .login-box input:focus { border-color: var(--rojo); }
    .login-box button { width: 100%; background: var(--rojo); color: var(--blanco); border: none; border-radius: 3px; padding: 0.85rem; font-family: 'Barlow Condensed', sans-serif; font-size: 1.05rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: background 0.15s; margin-top: 0.5rem; }
    .login-box button:hover { background: var(--rojo-oscuro); }
    .login-box button:disabled { background: #555; cursor: not-allowed; }
    .login-error { display: none; color: #f87171; font-size: 0.85rem; margin-top: 0.75rem; }

    /* PANEL */
    #configPanel { display: none; padding: 2rem 1.5rem 4rem; max-width: 760px; margin: 0 auto; }
    .panel-header { margin-bottom: 2rem; }
    .panel-header h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 2rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
    .panel-header p { color: var(--texto-muted); font-size: 0.9rem; margin-top: 0.3rem; }

    /* TOGGLE CARDS */
    .toggle-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem; }

    .toggle-card { background: var(--gris-medio); border: 1px solid var(--borde); border-left: 4px solid var(--rojo); border-radius: 2px; padding: 1.25rem 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
    .toggle-card.habilitada { border-left-color: var(--verde); }

    .toggle-info { flex: 1; min-width: 0; }
    .toggle-nombre { font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.2rem; }
    .toggle-estado { font-size: 0.8rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    .toggle-estado.on { color: #4ade80; }
    .toggle-estado.off { color: var(--texto-muted); }

    /* Switch */
    .switch { position: relative; width: 52px; height: 28px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #444; border-radius: 14px; cursor: pointer; transition: background 0.2s; }
    .slider::before { content: ''; position: absolute; width: 20px; height: 20px; left: 4px; top: 4px; background: #888; border-radius: 50%; transition: transform 0.2s, background 0.2s; }
    .switch input:checked + .slider { background: rgba(22,163,74,0.3); }
    .switch input:checked + .slider::before { transform: translateX(24px); background: #4ade80; }
    .switch.readonly .slider { cursor: not-allowed; opacity: 0.6; }

    .saving-indicator { display: none; font-size: 0.75rem; color: var(--texto-muted); letter-spacing: 1px; margin-top: 0.25rem; }

    .viewer-notice { background: rgba(255,255,255,0.04); border: 1px solid var(--borde); border-radius: 2px; padding: 0.75rem 1rem; margin-bottom: 1.5rem; font-size: 0.85rem; color: var(--texto-muted); }

    @media (max-width: 600px) {
      header { padding: 0 1rem; }
      .header-title span { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-logo">
      <a href="index.html" class="logo-circle"><img src="logo.jpeg" alt="SAC"></a>
      <div class="header-title">
        Salto Automóvil Club
        <span>Control de inscripciones</span>
      </div>
    </div>
    <div class="header-right">
      <a href="admin.html" class="nav-link">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Admin
      </a>
      <a href="stock.html" class="nav-link">
        <svg viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        Stock
      </a>
      <button id="btnLogout">Cerrar sesión</button>
    </div>
  </header>

  <div id="loginScreen">
    <div class="login-box">
      <h2>Acceso Admin</h2>
      <p>Ingresá con tu usuario y contraseña</p>
      <label for="inputEmail">Email</label>
      <input type="email" id="inputEmail" placeholder="admin@ejemplo.com" autocomplete="username">
      <label for="inputPass">Contraseña</label>
      <input type="password" id="inputPass" placeholder="••••••••" autocomplete="current-password">
      <button id="btnLogin">Ingresar</button>
      <div class="login-error" id="loginError">Email o contraseña incorrectos.</div>
    </div>
  </div>

  <div id="configPanel">
    <div class="panel-header">
      <h1>Inscripciones</h1>
      <p>Habilitá o deshabilitá las inscripciones por categoría.</p>
    </div>

    <div id="viewerNotice" class="viewer-notice" style="display:none">
      Modo lectura — no tenés permisos para modificar la configuración.
    </div>

    <div class="toggle-grid" id="toggleGrid">
      <!-- generado por JS -->
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://qpveivsqkudlqjbxcxzh.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_H6Q0geOf0yqMVQ8MfCcr9Q_31LSQMVg';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const CATEGORIAS = [
      { clave: 'inscripciones_karting',     nombre: 'Karting' },
      { clave: 'inscripciones_turismo',     nombre: 'TNS / TMZ' },
      { clave: 'inscripciones_trackday',    nombre: 'Track Day' },
      { clave: 'inscripciones_regularidad', nombre: 'Regularidad' },
      { clave: 'inscripciones_picadas',     nombre: 'Picadas 201mts' },
    ];

    let isAdmin = false;

    function renderToggles(valores) {
      const grid = document.getElementById('toggleGrid');
      grid.innerHTML = '';

      CATEGORIAS.forEach(({ clave, nombre }) => {
        const habilitada = valores[clave] !== 'false';

        const card = document.createElement('div');
        card.className = 'toggle-card' + (habilitada ? ' habilitada' : '');
        card.id = 'card-' + clave;

        card.innerHTML = `
          <div class="toggle-info">
            <div class="toggle-nombre">${nombre}</div>
            <div class="toggle-estado ${habilitada ? 'on' : 'off'}" id="estado-${clave}">
              ${habilitada ? 'Habilitada' : 'Deshabilitada'}
            </div>
            <div class="saving-indicator" id="saving-${clave}">Guardando…</div>
          </div>
          <label class="switch${isAdmin ? '' : ' readonly'}">
            <input type="checkbox" id="toggle-${clave}" ${habilitada ? 'checked' : ''} ${isAdmin ? '' : 'disabled'}>
            <span class="slider"></span>
          </label>
        `;

        if (isAdmin) {
          const input = card.querySelector('input[type=checkbox]');
          input.addEventListener('change', () => handleToggle(clave, input.checked));
        }

        grid.appendChild(card);
      });
    }

    async function handleToggle(clave, habilitada) {
      const savingEl = document.getElementById('saving-' + clave);
      const estadoEl = document.getElementById('estado-' + clave);
      const card = document.getElementById('card-' + clave);
      savingEl.style.display = 'block';

      const { error } = await sb.from('configuracion')
        .update({ valor: habilitada ? 'true' : 'false' })
        .eq('clave', clave);

      savingEl.style.display = 'none';

      if (error) {
        alert('Error al guardar. Intentá de nuevo.');
        const input = document.getElementById('toggle-' + clave);
        input.checked = !habilitada;
        return;
      }

      estadoEl.textContent = habilitada ? 'Habilitada' : 'Deshabilitada';
      estadoEl.className = 'toggle-estado ' + (habilitada ? 'on' : 'off');
      card.className = 'toggle-card' + (habilitada ? ' habilitada' : '');
    }

    async function initPanel() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) return;

      const { data: roleRow } = await sb.rpc('get_my_role');
      isAdmin = roleRow !== 'viewer';

      if (!isAdmin) {
        document.getElementById('viewerNotice').style.display = '';
      }

      const claves = CATEGORIAS.map(c => c.clave);
      const { data } = await sb.from('configuracion').select('clave,valor').in('clave', claves);
      const valores = {};
      (data || []).forEach(r => { valores[r.clave] = r.valor; });

      renderToggles(valores);

      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('configPanel').style.display = 'block';
      document.getElementById('btnLogout').style.display = '';
    }

    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) initPanel();
    });

    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN') initPanel();
    });

    document.getElementById('btnLogin').addEventListener('click', async () => {
      const btn = document.getElementById('btnLogin');
      const errEl = document.getElementById('loginError');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Ingresando…';

      const { error } = await sb.auth.signInWithPassword({
        email: document.getElementById('inputEmail').value.trim(),
        password: document.getElementById('inputPass').value,
      });

      btn.disabled = false;
      btn.textContent = 'Ingresar';
      if (error) errEl.style.display = 'block';
    });

    document.getElementById('inputPass').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btnLogin').click();
    });

    document.getElementById('btnLogout').addEventListener('click', async () => {
      await sb.auth.signOut();
      location.reload();
    });
  </script>

</body>
</html>
